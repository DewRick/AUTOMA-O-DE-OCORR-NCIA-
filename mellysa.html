<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fini - Ocorrência Barra da Tijuca</title>
  <style>
body{
font-family:'Segoe UI',sans-serif;
background:#050505;
background-image:
radial-gradient(circle at top,#ff00ff33 0%,transparent 35%),
radial-gradient(circle at bottom,#ff00ff33 0%,transparent 40%);
margin:0;
padding:12px;
color:#fff;
}
.container{
max-width:430px;
margin:auto;
background:#111;
border:1px solid #ff1493;
border-radius:24px;
padding:18px;
box-shadow:0 0 25px #ff149355,0 0 60px #ff149322;
}
h1{
text-align:center;
font-size:1.6rem;
color:#fff;
text-shadow:0 0 10px #ff1493,0 0 20px #ff1493;
margin-bottom:15px;
}
.lojas-title{
background:linear-gradient(90deg,#ff1493,#ff4fd8);
color:#fff;
padding:14px;
border-radius:16px;
text-align:center;
margin:20px 0;
width:auto;
font-weight:700;
letter-spacing:1px;
box-shadow:0 0 15px #ff1493;
}
.checkbox-list{
background:#181818;
padding:15px;
border-radius:16px;
margin-bottom:20px;
border:1px solid #ff149344;
}
.checkbox-list label{
display:block;
padding:8px;
border-radius:10px;
}
.checkbox-list label:hover{
background:#ff14931a;
}
.categoria-header{
background:#1b1b1b;
border:1px solid #ff149355;
color:#fff;
text-align:center;
font-weight:bold;
padding:16px;
margin:12px 0;
border-radius:16px;
cursor:pointer;
position:relative;
box-shadow:0 0 10px #ff149322;
}
.categoria-header.open{
background:linear-gradient(90deg,#ff1493,#ff4fd8);
box-shadow:0 0 20px #ff1493;
}
.categoria-header::after{
content:"▶";
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
}
.categoria-header.open::after{
content:"▼";
}
.categoria-content{
max-height:0;
overflow:hidden;
transition:max-height .4s ease;
}
.categoria-content.open{
max-height:4000px;
}
table{
width:100%;
border-collapse:separate;
border-spacing:0 6px;
font-size:.82em;
}
th{
background:#ff1493;
color:#fff;
padding:10px 5px;
}
td{
background:#1a1a1a;
padding:12px 6px;
}
.produto{width:62%;}
.status{text-align:center;width:19%;}
input[type=radio],input[type=checkbox]{
transform:scale(1.5);
accent-color:#ff1493;
}
.text-box{
background:#141414;
border:2px solid #ff1493;
border-radius:20px;
padding:20px;
margin-top:30px;
box-shadow:0 0 25px #ff149344;
}
.text-box h3{
text-align:center;
color:#ff6fd8;
text-shadow:0 0 10px #ff1493;
}
.star{
color:#ff1493;
font-size:40px;
text-align:center;
text-shadow:0 0 15px #ff1493;
}
.note{
color:#bbb;
text-align:center;
}
textarea{
width:100%;
min-height:320px;
background:#0d0d0d;
color:#fff;
border:1px solid #ff1493;
border-radius:14px;
padding:12px;
box-sizing:border-box;
}
.copy-btn{
width:100%;
padding:16px;
margin-top:15px;
background:linear-gradient(90deg,#ff1493,#ff4fd8);
color:#fff;
border:none;
border-radius:14px;
font-size:1rem;
font-weight:700;
box-shadow:0 0 15px #ff1493;
}
.copy-btn:active{
transform:scale(.98);
}
</style>
</head>
<body>
    <div class="container">
        <h1>AUTOMAÇÃO DE OCORRÊNCIA - FINI</h1>
        <div class="lojas-title">Lojas</div>
        <div class="checkbox-list" id="lojas"></div>
        <div id="categorias"></div>
        <div class="text-box">
            <h3>COPIE E COLE NOS GRUPOS</h3>
            <div class="star">★</div>
            <p class="note">Criado para agilizar o dia a dia nas lojas - Rickson C.</p>
            <textarea id="communicationText" readonly></textarea>
            <button class="copy-btn" onclick="copyText()">COPIAR TEXTO</button>
        </div>
    </div>
    <script>
        const lojas = [
            "Vivian Festa Campo Grande",
            "Caçula Campo Grande",
            "Dom Atacadista Campo Grande",
            "Drogaria Pacheco Campo Grande 4",
            "Drogaria Pacheco Campo Grande 5",
            "Drogaria Pacheco Campo Grande 6",
            "Drogaria Pacheco Campo Grande 7",
            "32 - Lasa - Campo Grande Rj",
            "424 - Lasa - Barcelos Domingos",
            "Superdoce Campo Grande",
            "Ufa Campo Grande"
        ];

                const produtos = {
            sm: {
                "80g": ["Dentadura 80g", "Beijos Morango 80g", "Banana 80g", "Minhoca Brilho 80g", "Minhoca Cítrica 80g", "Amora 80g", "Ursinho 80g", "Polvo 80g", "Sapo 80g", "Finiburguer 80g", "Aros 80g", "Ovo Frito 80g", "HP Coruja 80g", "HP Óculos 80g", "HP Chapeu 80g", "HP Raio 80g", "Rato 80g", "Escovinha 80g", "Oceanitos 80g", "Sorvetinho 80g", "Caveira Recheada 80g", "Fazendo Arte 80g", "Mix Surpresa 80g", "Morango 80g", "Melancia 80g"],
                "15g": ["Dentadura 15g", "Beijos Morango 15g", "Banana 15g", "Minhoca Brilho 15g", "Minhoca Cítrica 15g", "Amora 15g", "Ursinho 15g", "Dentadura da Bruxa 15g"],
                "35g": ["Dentadura 35g", "Beijos Morango 35g", "Banana 35g", "Minhoca Brilho 35g", "Minhoca Cítrica 35g", "Amora 35g", "Ursinho 35g"],
                "250g": ["Dentadura 250g", "Beijos 250g", "Banana 250g", "Minhoca Brilho 250g", "Minhoca Cítrica 250g", "Amora 250g", "Ursinho 250g", "Aros de Morango 250g", "Polvo 250g", "Sapo 250g", "Sorvetinho 250g", "Oceanitos 250g", "Mix Surpresa 250g", "Rato 250g", "Fazendo Arte 250g", "Caveira Recheada 250g", "Aranha 250g", "Frutie Frutas Vermelhas 250g", "Frutie Sobremesa 250g", "Frutie Sobremesa 250g"],
                "500g": ["Banana 500g", "Dentadura 500g", "Beijos Morango 500g", "Minhoca Brilho 500g", "Minhoca Cítrica 500g", "Amora 500g", "Ursinho 500g", "Aros de Morango 500g", "Polvo 500g", "Sapo 500g", "Sorvetinho 500g", "Oceanitos 500g", "Mix Surpresa 500g", "Rato 500g", "Fazendo Arte 500g", "Caveira Recheada 500g", "Aranha 500g","Frutie Frutas Vermelhas 250g", "Frutie Sobremesa 250g", "Frutie Sobremesa 250g"]
            },
            tubes: {
                "80g": ["Morango Cítrico 80g", "Morango Nata 80g", "Tutti Fruti 80g", "Arco Íris 80g", "Twister Cítrico 80g", "Twister 80g", "Uva Cítrico 80g", "Uva 80g", "Tropical 80g", "Azedinho 80g", "Terror 80g", "Copa 80g", "Maça do amor 80g", "Desenrola Estika 80g"],
                "35g": ["Morango 35g", "Morango Cítrico 35g", "Tutti Fruti 35g", "Twister 35g", "Azedíssimo 35g"],
                "40g": ["Morango Cítrico 40g", "Morango Nata 40g", "Twister Cítrico 40g", "Twister 40g"],
                "15g": ["Tubes Morango Cítrico 15g", "Tubes Morango Nata 15g", "Tubes Pinta Língua 15g", "Tubes Halloween 15g", "Três Cores Azedinho 15g", "Tutti Fruti 15g", "Twister 15g", "Morango com Laranja 15g", "Boo Uva 15g","Copa 15g", "Maça do Amor 15g"],
                "27g": ["Tubes Iorgute 27g", "Tubes Morango 27g", "Tubes Morango Cítrico 27g", "Tubes Twister 27g", "Tubes Framboesa 27g", "Tubes Boo 27g"],
                "240g": ["Morango 240g", "Morango Cítrico 240g"]
            },
            chicle: {
                "80g": ["Chicle Salada de Fruta 80g", "Melancia 80g", "Ovo Dinossauro 80g"],
                "140g": ["Fúria Ácida 140g"],
                "230g": ["Melancia 230g", "Salada de Fruta 230g", "Ovo de Dino 230g"],
                "250g": ["Chicle Melancia 250g", "Ovo Dinossauro 250g"],
                "450g": ["Ovo de Dino 450g", "Melancia 450g", "Salada de Fruta 450g"]
            },
            mash: {
                "80g": ["Torção Recheado 80g", "Torção Azul Rech 80g", "Torção Rosa Rech 80g", "Torção Tricolor 80g", "Torção Azul 80g", "Torção Rosa 80g", "Torção Branco 80g", "Alvorada 80g", "Flor 80g", "Coração 80g", "Borboleta 80g", "Morango 80g", "Vulcão Azul 80g", "Vulcão Rosa 80g", "Fondue 80g", "Maria Mole 80g", "Milho 80g", "Camping 80g", "Pipoca 80g", "Pistache 80g", "Paçoquita 80g"],
                "250g": ["Torção Recheado 250g", "Torção Azul Rech 250g", "Torção Rosa Rech 250g", "Torção Tricolor 250g", "Torção Azul 250g", "Torção Rosa 250g", "Torção Branco 250g", "Alvorada 250g", "Flor 250g", "Coração 250g", "Borboleta 250g", "Morango 250g", "Vulcão Azul 250g", "Vulcão Rosa 250g", "Fondue 250g", "Maria Mole 250g", "Milho 250g", "Camping 250g", "Pipoca 250g", "Mashboo 250g", "Mashboo RIP 250g", "Pistache 250g", "Paçoquita 250g"],
                "500g": ["Torção Recheado 500g", "Torção Azul Rech 500g", "Torção Rosa Rech 500g", "Torção Tricolor 500g", "Torção Azul 500g", "Torção Rosa 500g", "Torção Branco 500g", "Alvorada 500g", "Flor 500g", "Coração 500g", "Borboleta 500g", "Morango 500g", "Vulcão Azul 500g", "Vulcão Rosa 500g", "Fondue 500g", "Maria Mole 500g", "Milho 500g", "Camping 500g", "Pipoca 500g", "Pistache 500g"]
            },
            bemEstar: { "18g": ["Vitamina C Banana Kids 18g", "Vitamina C Morango Kids 18g", "Vitamina C 18g", "Colágeno 18g", "Ursinho Diet 18g"] },
            zeroAcucares: { "35g": ["Natureza Zero 35g", "Coração Zero 35g", "Fruts Zero 35g", "Tropical Zero 35g"] },
            algodaoPipo: { "80g": ["Pipoca Banana 80g Pipo-Fini", "Pipoca Dentadura 80g Pipo-Fini", "Pipoca Beijos 80g Pipo-Fini"] },
            caldas: { "1kg": ["Calda para Sorvete Dentadura 1kg", "Calda para Sorvete Beijos 1kg", "Calda para Sorvete Banana 1kg"] },
            caldaRecheio: { "1.01kg": ["Recheio Banana 1.01kg", "Recheio Dentadura 1.01kg", "Recheio Beijos 1.01kg"] },
            drGood: { "unidades": ["Dr. Good Vitaminas C 30 unidades", "Dr. Good Vitaminas C Kids 60 unidades", "Dr. Good Multigood Kids 30 unidades", "Dr. Good Multigood 30 unidades", "Dr. Good 5+Imune 30 unidades", "Dr. Good 5+Imune Diet 30 unidades", "Dr. Good Hair 60 unidades", "Dr. Good Melatonina 60 unidades"] },
            roller: { "20g": ["Tiras Roller Frutas Azedinho 20g", "Tiras Roller Morango Azedinho 20g"] }
        };

        const categoriaNomes = {
            sm: "SM+", tubes: "TUBES+", chicle: "CHICLE+", mash: "MASH+",
            bemEstar: "BEM ESTAR", zeroAcucares: "ZERO AÇÚCARES",
            algodaoPipo: "ALGODÃO / PIPÓ", caldas: "CALDAS",
            caldaRecheio: "CALDA RECHEIO", drGood: "DR. GOOD", roller: "ROLLER"
        };

        // Gerar lojas
        const lojasDiv = document.getElementById('lojas');
        lojas.forEach(loja => {
            lojasDiv.innerHTML += `<label><input type="checkbox" name="loja" value="${loja}"> ${loja}</label>`;
        });

        // Gerar categorias (todas fechadas)
        const categoriasDiv = document.getElementById('categorias');
        Object.keys(produtos).forEach(catKey => {
            const catNome = categoriaNomes[catKey];
            Object.keys(produtos[catKey]).forEach(gramatura => {
                const lista = produtos[catKey][gramatura];
                if (lista.length === 0) return;
                const titulo = `${catNome} ${gramatura.toUpperCase()}`;
                const sectionId = `section-${catKey}-${gramatura.replace('.', '')}`;
                categoriasDiv.innerHTML += `
                    <div class="categoria-header" onclick="toggleSection('${sectionId}', this)">${titulo}</div>
                    <div id="${sectionId}" class="categoria-content">
                        <table>
                            <tr>
                                <th class="produto">Produto</th>
                                <th class="status">Baixo Volume</th>
                                <th class="status">Ruptura</th>
                            </tr>
                            ${lista.map(prod => {
                                const id = prod.replace(/[^a-zA-Z0-9]/g, '_');
                                return `
                                    <tr>
                                        <td>${prod}</td>
                                        <td class="status"><input type="radio" name="${id}" value="baixo"></td>
                                        <td class="status"><input type="radio" name="${id}" value="ruptura"></td>
                                    </tr>`;
                            }).join('')}
                        </table>
                    </div>`;
            });
        });

        function toggleSection(id, header) {
            const content = document.getElementById(id);
            header.classList.toggle('open');
            content.classList.toggle('open');
        }

        function updateText() {
            let text = "COMUNICAÇÃO DE OCORRÊNCIA\n\n";
            const selectedLojas = Array.from(document.querySelectorAll('input[name="loja"]:checked')).map(cb => cb.value);
            text += selectedLojas.length > 0 ? "LOJA: " + selectedLojas.join(', ') + "\n\n" : "LOJA: Nenhuma selecionada\n\n";

            let baixo = [];
            let ruptura = [];
            document.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
                const row = radio.closest('tr');
                const produto = row.querySelector('td:first-child').textContent.trim();
                if (radio.value === "baixo") baixo.push(produto);
                else if (radio.value === "ruptura") ruptura.push(produto);
            });

            if (baixo.length > 0) {
                text += "• OCORRÊNCIA DE Baixo Volume\n\n• Produtos em Baixo Volume\n\n";
                baixo.forEach(p => text += `- ${p}\n`);
                text += "\n";
            }
            if (ruptura.length > 0) {
                text += "• OCORRÊNCIA DE Ruptura\n\n• Produtos em Ruptura\n\n";
                ruptura.forEach(p => text += `- ${p}\n`);
                text += "\n";
            }
            if (baixo.length === 0 && ruptura.length === 0) {
                text += "• Nenhuma ocorrência marcada\n\n";
            }

            const hoje = new Date().toLocaleDateString('pt-BR');
            text += `Data: ${hoje}`;
            document.getElementById('communicationText').value = text;
        }

        function copyText() {
            const textarea = document.getElementById('communicationText');
            textarea.select();
            document.execCommand('copy');
            alert('Texto copiado para a área de transferência!');
        }

        document.addEventListener('change', updateText);

        // Inicializa com texto vazio correto
        updateText();
    </script>
</body>
</html>
