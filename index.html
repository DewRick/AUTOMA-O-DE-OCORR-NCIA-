<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Automação de Ocorrência</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#080808;
    min-height:100vh;
    color:white;
    padding:20px;
    background-image:
    radial-gradient(circle at top left, rgba(0,255,128,.15), transparent 30%),
    radial-gradient(circle at top right, rgba(0,153,255,.12), transparent 35%);
}

.container{
    width:100%;
    max-width:480px;
    margin:auto;
}

.header{
    text-align:center;
    padding:30px 20px;
    border-radius:28px;
    background:rgba(15,15,15,.95);
    border:1px solid rgba(0,255,128,.25);
    box-shadow:
    0 0 30px rgba(0,255,128,.08),
    inset 0 0 30px rgba(0,255,128,.05);
}

.header img{
    width:95px;
    margin-bottom:15px;
    filter:drop-shadow(0 0 15px #00ff88);
}

.header h1{
    font-size:30px;
    color:#00ff88;
    text-shadow:0 0 15px #00ff88;
}

.header p{
    color:#9b9b9b;
    margin-top:6px;
}

.selection-card{
    margin-top:25px;
    padding:20px;
    border-radius:22px;
    background:#101010;
    border:1px solid rgba(0,255,128,.18);
    box-shadow:0 0 20px rgba(0,255,128,.06);
    text-align:center;
}

.selection-card h3{
    color:#00ff88;
    margin-bottom:8px;
}

.selection-card span{
    color:#aaa;
    font-size:14px;
}

.text-box{
    margin-top:20px;
    padding:20px;
    border-radius:24px;
    background:#101010;
    border:1px solid rgba(255,255,255,.06);
}

.star{
    text-align:center;
    font-size:35px;
    color:#00ff88;
    text-shadow:0 0 15px #00ff88;
    margin-bottom:20px;
}

.btn-group{
    display:flex;
    gap:12px;
    margin-bottom:12px;
}

.btn-group a{
    flex:1;
    text-decoration:none;
}

.btn-fundo{
    width:100%;
    min-height:95px;
    border:none;
    border-radius:22px;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
    background-size:cover;
    background-position:center;
    backdrop-filter:blur(10px);
}

.btn-fundo:hover{
    transform:translateY(-3px) scale(1.02);
}

.btn-fundo:active{
    transform:scale(.97);
}

.men{
    background:
    linear-gradient(135deg,#009dff,#003cff);
    box-shadow:
    0 0 15px rgba(0,153,255,.5),
    inset 0 0 20px rgba(255,255,255,.08);
}

.woman{
    background:
    linear-gradient(135deg,#ff00d4,#ff4fa7);
    box-shadow:
    0 0 15px rgba(255,0,212,.45),
    inset 0 0 20px rgba(255,255,255,.08);
}

.admin{
    width:100%;
    min-height:110px;
    margin-top:20px;
    background:
    linear-gradient(135deg,#00ff88,#009dff);
    color:#000;
    font-size:17px;
    font-weight:700;
    box-shadow:
    0 0 25px rgba(0,255,128,.4),
    0 0 35px rgba(0,153,255,.3);
}

.note{
    margin-top:25px;
    text-align:center;
    font-size:12px;
    color:#8f8f8f;
    line-height:1.5;
    border-top:1px solid rgba(255,255,255,.08);
    padding-top:15px;
}

@media(max-width:450px){

    .btn-group{
        flex-direction:column;
    }

}
</style>
</head>
